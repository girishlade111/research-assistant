<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with subtle metallic depth -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#0C0C0C"/>
    </linearGradient>
    <linearGradient id="chrome-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#E0E0E0"/>
      <stop offset="100%" stop-color="#A0A0A0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="102" fill="url(#bg-grad)"/>
  <rect x="2" y="2" width="508" height="508" rx="100" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>

  <!-- Enterprise Orchestrator Core -->
  <path d="M256 128L366.8 192V320L256 384L145.2 320V192L256 128Z" fill="url(#chrome-grad)" filter="url(#glow)"/>
  
  <!-- Internal Structural Detail -->
  <path d="M256 176L325.2 216V296L256 336L186.8 296V216L256 176Z" fill="#0C0C0C"/>
  <circle cx="256" cy="256" r="32" fill="url(#chrome-grad)"/>
  <circle cx="256" cy="256" r="12" fill="#0C0C0C"/>

  <!-- Agent Network Nodes (Sub-Agents) -->
  <circle cx="256" cy="96" r="24" fill="white" fill-opacity="0.8"/>
  <circle cx="422.3" cy="352" r="24" fill="white" fill-opacity="0.8"/>
  <circle cx="89.7" cy="352" r="24" fill="white" fill-opacity="0.8"/>

  <!-- Connection Lines -->
  <line x1="256" y1="128" x2="256" y2="96" stroke="white" stroke-width="4" stroke-opacity="0.4" stroke-dasharray="8 8"/>
  <line x1="366.8" y1="320" x2="422.3" y2="352" stroke="white" stroke-width="4" stroke-opacity="0.4" stroke-dasharray="8 8"/>
  <line x1="145.2" y1="320" x2="89.7" y2="352" stroke="white" stroke-width="4" stroke-opacity="0.4" stroke-dasharray="8 8"/>
</svg>